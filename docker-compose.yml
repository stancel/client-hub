services:
  client-hub-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: client-hub-api
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-clienthub}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      API_KEY: ${API_KEY:-dev-api-key}
      API_HOST: 0.0.0.0
      API_PORT: 8800
    networks:
      - my-main-net

networks:
  my-main-net:
    external: true
