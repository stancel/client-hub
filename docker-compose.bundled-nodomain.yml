## Client Hub — Bundled Deployment WITHOUT TLS (no domain)
## Exposes API on port 8800 directly. Used when no domain is provided.
## WARNING: No TLS. Use only for testing or behind a separate reverse proxy.

services:
  mariadb:
    image: mariadb:12.2
    container_name: clienthub-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-clienthub}
      MARIADB_USER: ${DB_USER:-clienthub}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: UTC
    volumes:
      - ./data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clienthub

  client-hub-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: clienthub-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8800:8800"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-clienthub}
      DB_USER: ${DB_USER:-clienthub}
      DB_PASSWORD: ${DB_PASSWORD}
      CLIENTHUB_ROOT_API_KEY: ${CLIENTHUB_ROOT_API_KEY}
      API_KEY: ${CLIENTHUB_ROOT_API_KEY}
      API_HOST: 0.0.0.0
      API_PORT: 8800
      TZ: UTC
    networks:
      - clienthub

networks:
  clienthub:
    driver: bridge
