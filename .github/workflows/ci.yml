name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff rstcheck

      - name: Lint Python (ruff)
        run: ruff check api/app/ api/tests/

      - name: Lint RST docs
        run: rstcheck --report-level warning docs/*.rst CHANGELOG.rst TODO.rst README.rst

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mariadb:
        image: mariadb:12
        env:
          MARIADB_ROOT_PASSWORD: test_root_password
          MARIADB_DATABASE: test_schema
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            if mariadb -h 127.0.0.1 -u root -ptest_root_password -e "SELECT 1" 2>/dev/null; then
              break
            fi
            sleep 2
          done

      - name: Run migrations
        run: |
          for f in migrations/0*.sql; do
            mariadb -h 127.0.0.1 -u root -ptest_root_password test_schema < "$f"
          done

      - name: Seed lookup data
        run: mariadb -h 127.0.0.1 -u root -ptest_root_password test_schema < migrations/011_seed_lookup_data.sql

      - name: Seed test data
        run: mariadb -h 127.0.0.1 -u root -ptest_root_password test_schema < migrations/012_seed_test_data.sql

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: test_schema
          DB_USER: root
          DB_PASSWORD: test_root_password
          API_KEY: test-api-key
        working-directory: api
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t client-hub-api:${{ github.sha }} api/

      - name: Verify image
        run: docker image inspect client-hub-api:${{ github.sha }} > /dev/null

  generate-sdks:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Start API for spec generation
        run: |
          docker compose build
          docker compose up -d
          sleep 5
        env:
          DB_NAME: dev_schema
          DB_USER: root
          DB_PASSWORD: unused
          API_KEY: ci-key

      - name: Generate SDKs
        run: ./scripts/generate-sdks.sh
        continue-on-error: true

      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdks
          path: sdks/
          if-no-files-found: warn
